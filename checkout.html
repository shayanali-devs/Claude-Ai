<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Checkout — Tempura Potato</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
.checkout-wrapper{max-width:1100px;margin:0 auto;padding:120px 24px 80px;display:grid;grid-template-columns:1fr 420px;gap:40px;}
@media(max-width:900px){.checkout-wrapper{grid-template-columns:1fr;}}
.checkout-panel{background:var(--black3);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:32px;}
.checkout-panel h2{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--white);margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:16px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;margin-bottom:8px;}
.form-input{width:100%;background:var(--black4);border:1px solid rgba(255,255,255,0.1);color:var(--white);padding:14px 16px;border-radius:var(--radius-sm);font-size:15px;}
.form-input:focus{border-color:var(--yellow);}
.delivery-toggle{display:flex;gap:12px;margin-bottom:8px;}
.delivery-opt{flex:1;padding:14px;background:var(--black4);border:2px solid rgba(255,255,255,0.1);border-radius:var(--radius-sm);text-align:center;cursor:pointer;font-weight:700;}
.delivery-opt.active{border-color:var(--yellow);color:var(--yellow);background:rgba(245,200,66,0.08);}
.location-btn{width:100%;margin-top:8px;padding:12px;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.3);color:var(--yellow);border-radius:var(--radius-sm);cursor:pointer;}
.order-summary{background:var(--black3);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);padding:32px;position:sticky;top:100px;}
.order-summary h2{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--white);margin-bottom:24px;}
.cart-items-list{max-height:300px;overflow-y:auto;margin-bottom:20px;}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.ci-emoji{font-size:28px;min-width:40px;}
.ci-info{flex:1;}
.ci-name{font-size:14px;font-weight:600;}
.ci-price{font-family:'Bebas Neue',cursive;font-size:20px;color:var(--yellow);}
.ci-remove{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:18px;}
.ci-remove:hover{color:#ff4444;}
.order-totals{margin-bottom:24px;}
.order-total-row{display:flex;justify-content:space-between;font-size:14px;color:var(--gray);margin-bottom:8px;}
.order-total-row.total{font-size:18px;font-weight:700;color:var(--white);border-top:1px solid rgba(255,255,255,0.1);padding-top:12px;margin-top:8px;}
.order-total-row.total span:last-child{color:var(--yellow);font-size:24px;}
.empty-cart{text-align:center;padding:40px;color:var(--gray);}
.checkout-btns{display:flex;flex-direction:column;gap:12px;}
.btn-whatsapp{display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#fff;padding:16px;border-radius:30px;font-weight:700;text-decoration:none;cursor:pointer;}
.btn-whatsapp:hover{background:#128C7E;}
.promo-input{display:flex;gap:8px;margin-bottom:16px;}
.promo-input input{flex:1;}
.promo-apply{padding:0 20px;background:var(--yellow);color:var(--black);border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:700;}
.user-bar{background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.2);border-radius:var(--radius-sm);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#333;padding:12px;border-radius:25px;font-weight:700;cursor:pointer;width:100%;}
</style>
</head>
<body>
<nav class="navbar scrolled"><div class="nav-logo" onclick="location='index.html'"><div class="nav-logo-icon">🍔</div><div class="nav-logo-text"><span class="nav-brand">TEMPURA</span><span class="nav-sub">POTATO</span></div></div></nav>
<div style="background:var(--black);min-height:100vh;">
  <div class="page-hero"><div class="section-tag">YOUR ORDER</div><h1>Check<span>out</span></h1></div>
  <div class="checkout-wrapper">
    <div>
      <div id="auth-section"></div>
      <div class="checkout-panel" style="margin-bottom:24px;"><h2>Delivery Type</h2><div class="delivery-toggle"><div class="delivery-opt active" id="opt-delivery" onclick="selectDelivery('delivery')">🛵 Delivery</div><div class="delivery-opt" id="opt-pickup" onclick="selectDelivery('pickup')">🏃 Pickup</div></div></div>
      <div class="checkout-panel"><h2>Your Details</h2><div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="inp-name"/></div><div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="inp-phone"/></div><div id="delivery-fields"><div class="form-group"><label class="form-label">Address</label><textarea class="form-input" id="inp-address" rows="3"></textarea></div><button class="location-btn" onclick="getLocation()">📍 Share Live Location</button></div><div class="form-group"><label class="form-label">Notes</label><textarea class="form-input" id="inp-notes" rows="2"></textarea></div></div>
    </div>
    <div class="order-summary"><h2>Order Summary</h2><div id="auth-user-bar"></div><div class="cart-items-list" id="cart-items-list"></div><div class="promo-input"><input class="form-input" id="promo-code" placeholder="Promo code"><button class="promo-apply" onclick="applyPromo()">Apply</button></div><div class="order-totals"><div class="order-total-row"><span>Subtotal</span><span id="subtotal">Rs.0</span></div><div class="order-total-row" id="discount-row" style="display:none"><span>Discount</span><span id="discount-amt">-Rs.0</span></div><div class="order-total-row"><span>Delivery</span><span id="delivery-fee">Rs.60</span></div><div class="order-total-row total"><span>Total</span><span id="total-price">Rs.0</span></div></div><div class="checkout-btns"><button class="btn-primary btn-place-order" onclick="placeOrder()">Place Order 🎉</button><button class="btn-whatsapp" onclick="orderOnWhatsApp()">📱 Order on WhatsApp</button></div></div>
  </div>
</div>
<footer class="footer"><div class="footer-bottom"><span>© 2026 Tempura Potato. Main Bazar Nishat Colony, Milad Chock, Lahore</span></div></footer>
<div class="toast"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="app.js"></script>
<script>
let cart = JSON.parse(localStorage.getItem('tp_cart') || '[]');
let currentUser = null, deliveryType = 'delivery', discount = 0, userLocation = null;
const WHATSAPP_NUM = '923044888775', DELIVERY_FEE = 60;

function renderCart(){
  const list=document.getElementById('cart-items-list');
  if(!cart.length){ list.innerHTML='<div class="empty-cart">🛒<p>Your cart is empty</p><a href="index.html#menu" class="btn-primary">Browse Menu</a></div>'; document.getElementById('subtotal').innerText='Rs.0'; document.getElementById('total-price').innerText='Rs.0'; return; }
  list.innerHTML=cart.map((item,i)=>`<div class="cart-item"><div class="ci-emoji">${item.emoji||'🍔'}</div><div class="ci-info"><div class="ci-name">${item.name}</div><div class="ci-qty">Qty: ${item.qty}</div></div><div class="ci-price">Rs.${item.price*item.qty}</div><button class="ci-remove" onclick="removeItem(${i})">✕</button></div>`).join('');
  const subtotal=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const discountAmt=Math.round(subtotal*discount);
  const fee=deliveryType==='delivery'?DELIVERY_FEE:0;
  const total=subtotal-discountAmt+fee;
  document.getElementById('subtotal').innerText=`Rs.${subtotal}`;
  document.getElementById('delivery-fee').innerText=fee?`Rs.${fee}`:'Free';
  document.getElementById('total-price').innerText=`Rs.${total}`;
  const dRow=document.getElementById('discount-row');
  if(discountAmt){ dRow.style.display=''; document.getElementById('discount-amt').innerText=`-Rs.${discountAmt}`; }
  else dRow.style.display='none';
}
window.removeItem=function(i){ cart.splice(i,1); localStorage.setItem('tp_cart',JSON.stringify(cart)); renderCart(); };
function applyPromo(){ const code=document.getElementById('promo-code').value.toUpperCase(); if(code==='FIRSTORDER'||code==='APP20'){ discount=0.20; showToast('20% off applied!'); renderCart(); } else showToast('Invalid code'); }
function selectDelivery(type){ deliveryType=type; document.getElementById('opt-delivery').classList.toggle('active',type==='delivery'); document.getElementById('opt-pickup').classList.toggle('active',type==='pickup'); document.getElementById('delivery-fields').style.display=type==='delivery'?'':'none'; renderCart(); }
function getLocation(){ navigator.geolocation.getCurrentPosition(pos=>{ userLocation={lat:pos.coords.latitude,lng:pos.coords.longitude}; showToast('Location captured'); },()=>showToast('Location denied')); }
async function placeOrder(){
  if(!cart.length){ showToast('Cart empty'); return; }
  const name=document.getElementById('inp-name').value, phone=document.getElementById('inp-phone').value, address=document.getElementById('inp-address').value;
  if(!name||!phone){ showToast('Name and phone required'); return; }
  if(deliveryType==='delivery'&&!address){ showToast('Address required'); return; }
  const subtotal=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const total=subtotal+(deliveryType==='delivery'?DELIVERY_FEE:0);
  const order={id:Date.now().toString(),customer:{name,phone,uid:currentUser?.uid||null},address:deliveryType==='delivery'?address:'PICKUP',location:userLocation,items:cart,notes:document.getElementById('inp-notes').value,subtotal,fee:deliveryType==='delivery'?DELIVERY_FEE:0,total,deliveryType,status:'pending',timestamp:Date.now()};
  if(window.db) await window.db.ref('orders/'+order.id).set(order);
  localStorage.removeItem('tp_cart');
  window.location.href=`tracking.html?order=${order.id}`;
}
function orderOnWhatsApp(){
  if(!cart.length) return;
  const name=document.getElementById('inp-name').value||'Customer';
  const phone=document.getElementById('inp-phone').value;
  const address=document.getElementById('inp-address').value;
  const subtotal=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const total=subtotal+(deliveryType==='delivery'?DELIVERY_FEE:0);
  let msg=`🍔 TEMPURA POTATO ORDER\nName: ${name}\nPhone: ${phone}\nType: ${deliveryType}\n${deliveryType==='delivery'?`Address: ${address}\n`:''}\nItems:\n`+cart.map(i=>`• ${i.name} x${i.qty} = Rs.${i.price*i.qty}`).join('\n')+`\nTotal: Rs.${total}`;
  window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`,'_blank');
}
function showToast(msg){ let t=document.querySelector('.toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
// Auth
if(window.auth){
  window.auth.onAuthStateChanged(user=>{ currentUser=user; const section=document.getElementById('auth-section'); const userBar=document.getElementById('auth-user-bar'); if(user){ section.innerHTML=''; userBar.innerHTML=`<div class="user-bar"><span>👤 ${user.displayName||user.email}</span><button onclick="window.auth.signOut()">Sign out</button></div>`; document.getElementById('inp-name').value=user.displayName||''; } else { userBar.innerHTML=''; section.innerHTML=`<div class="checkout-panel"><button class="btn-google" onclick="window.auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())">🔐 Sign in for 20% off</button></div>`; } });
}
renderCart();
</script>
</body>
</html>
