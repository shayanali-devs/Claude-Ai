<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#080808"/>
<title>Checkout — Tempura Potato</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <a class="nav-logo" href="index.html">
    <span class="nav-logo-icon" data-logo-emoji>🥔</span>
    <div><span class="nav-brand" data-brand>TEMPURA</span><span class="nav-sub" data-tagline>POTATO</span></div>
  </a>
  <div class="nav-links">
    <a href="index.html#menu">Menu</a>
    <a href="index.html#deals">Deals</a>
  </div>
  <div class="nav-ham" id="nav-ham"><span></span><span></span><span></span></div>
</nav>
<div class="mob-menu" id="mob-menu">
  <a href="index.html" onclick="document.getElementById('mob-menu').classList.remove('open')">Home</a>
  <a href="index.html#menu" onclick="document.getElementById('mob-menu').classList.remove('open')">Menu</a>
</div>

<div style="background:var(--black);min-height:100vh">
  <div style="background:var(--black2);padding:110px 28px 40px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)">
    <div class="section-tag">YOUR ORDER</div>
    <h1 style="font-family:'Bebas Neue',cursive;font-size:clamp(40px,7vw,72px);color:var(--white)">Check<span style="color:var(--yellow)">out</span></h1>
  </div>

  <div class="checkout-wrap">
    <!-- LEFT -->
    <div>
      <div id="auth-block" style="margin-bottom:20px"></div>

      <!-- DELIVERY TYPE -->
      <div class="panel" style="margin-bottom:18px">
        <h2>Order Type</h2>
        <div class="del-toggle">
          <div class="del-opt active" id="opt-del" onclick="setDel('delivery')">🛵 Delivery</div>
          <div class="del-opt" id="opt-pick" onclick="setDel('pickup')">🏃 Pickup</div>
        </div>
      </div>

      <!-- DETAILS -->
      <div class="panel">
        <h2>Your Details</h2>
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="inp-name" placeholder="Your name"/></div>
        <div class="form-group"><label class="form-label">Phone Number</label><input class="form-input" id="inp-phone" type="tel" placeholder="+92 3xx xxxxxxx"/></div>
        <div id="del-fields">
          <div class="form-group"><label class="form-label">Delivery Address</label><textarea class="form-input" id="inp-addr" rows="3" placeholder="Full address, area, landmark..."></textarea></div>
          <div class="form-group">
            <label class="form-label">Live Location (optional)</label>
            <button class="loc-btn" onclick="getGPS()">📍 Share My Live Location</button>
            <p id="gps-status" style="font-size:12px;color:var(--gray);margin-top:6px"></p>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Special Instructions</label><textarea class="form-input" id="inp-notes" rows="2" placeholder="Extra spicy? No onions? Tell us!"></textarea></div>
      </div>
    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div>
      <div class="panel" style="position:sticky;top:100px">
        <h2>Order Summary</h2>
        <div id="user-bar-slot"></div>
        <div class="cart-list" id="cart-list"></div>
        <div class="promo-row">
          <input class="form-input" id="promo-inp" placeholder="Promo code"/>
          <button class="promo-apply" onclick="applyPromo()">Apply</button>
        </div>
        <div id="totals-block"></div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">
          <button class="btn btn-primary" style="width:100%;font-size:15px;padding:15px" onclick="placeOrder()">Place Order 🎉</button>
          <button class="btn-wa" onclick="orderWA()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Order on WhatsApp
          </button>
        </div>
        <p style="text-align:center;font-size:11px;color:var(--gray2);margin-top:14px">Cash on delivery. No hidden charges.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="core.js"></script>
<script>
// ── INIT ─────────────────────────────────────────────────────
document.getElementById('nav-ham').addEventListener('click',()=>document.getElementById('mob-menu').classList.toggle('open'));
loadSiteSettings();

let delType='delivery', discount=0, userGPS=null, currentUser=null, waNumber='923044888775', deliveryFee=60;

// Load settings from Firebase
const db=getDB();
if(db){
  db.ref('settings').once('value').then(s=>{
    const v=s.val()||{};
    if(v.waNumber) waNumber=v.waNumber;
    if(v.deliveryFee) deliveryFee=Number(v.deliveryFee);
    renderTotals();
  }).catch(()=>{});
}

// ── AUTH ──────────────────────────────────────────────────────
const auth = getAuth();
if(auth){
  auth.onAuthStateChanged(user=>{
    currentUser=user;
    renderAuth();
    if(user && !discount) { discount=0.20; renderTotals(); Toast.show('20% discount applied! 🎉'); }
  });
}

function renderAuth(){
  const authBlock = document.getElementById('auth-block');
  const userBarSlot = document.getElementById('user-bar-slot');
  if(currentUser){
    authBlock.innerHTML='';
    userBarSlot.innerHTML=`<div class="user-bar">
      <div class="user-bar-info"><span>👤</span><span>${currentUser.displayName||currentUser.email}</span></div>
      <button class="btn-signout" onclick="doSignOut()">Sign out</button>
    </div>`;
    if(currentUser.displayName) document.getElementById('inp-name').value=currentUser.displayName;
  } else {
    userBarSlot.innerHTML='';
    authBlock.innerHTML=`<div class="panel"><div class="auth-prompt">
      <p>🎉 Sign in with Google to get <strong>20% OFF</strong> your first order!</p>
      <button class="btn-google" onclick="doSignIn()">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%234285F4' d='M46.5 24.4c0-1.6-.1-3.1-.4-4.6H24v8.7h12.7c-.5 2.8-2.2 5.2-4.7 6.8v5.7h7.6c4.5-4.1 7-10.2 7-16.6z'/%3E%3Cpath fill='%2334A853' d='M24 47c6.5 0 11.9-2.1 15.9-5.8l-7.6-5.7c-2.2 1.4-4.9 2.3-8.3 2.3-6.4 0-11.8-4.3-13.7-10.1H2.4v5.9C6.4 41.7 14.6 47 24 47z'/%3E%3Cpath fill='%23FBBC05' d='M10.3 28.7A13.8 13.8 0 019.6 24c0-1.6.3-3.2.7-4.7v-5.9H2.4A23 23 0 000 24c0 3.8.9 7.4 2.4 10.6l7.9-5.9z'/%3E%3Cpath fill='%23EA4335' d='M24 9.5c3.6 0 6.8 1.2 9.3 3.6l7-7C36 2.2 30.5 0 24 0 14.6 0 6.4 5.3 2.4 13.4l7.9 5.9C12.2 13.8 17.6 9.5 24 9.5z'/%3E%3C/svg%3E" width="20" alt="G"/>
        Continue with Google
      </button>
    </div></div>`;
  }
}
async function doSignIn(){
  try{ await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }catch(e){ Toast.show('Sign in failed'); }
}
async function doSignOut(){ await auth.signOut(); discount=0; renderTotals(); }

// ── CART RENDER ───────────────────────────────────────────────
// NOTE: reads FRESH from localStorage every time — no caching bug
function renderCart(){
  const items = Cart.get();  // Always reads fresh from localStorage
  const list = document.getElementById('cart-list');
  if(!items.length){
    list.innerHTML=`<div class="empty-cart">
      <div class="empty-cart-icon">🛒</div>
      <p style="margin-bottom:16px">Your cart is empty</p>
      <a href="index.html#menu" class="btn btn-primary" style="font-size:13px;padding:10px 22px">Browse Menu</a>
    </div>`;
    renderTotals(); return;
  }
  list.innerHTML=items.map(item=>`
    <div class="ci">
      <img class="ci-img" src="${item.image||'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100&q=60'}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100&q=60'"/>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-qty-row">
          <button class="ci-qty-btn" onclick="Cart.updateQty('${item.id}',${item.qty-1})">−</button>
          <span class="ci-qty-num">${item.qty}</span>
          <button class="ci-qty-btn" onclick="Cart.updateQty('${item.id}',${item.qty+1})">+</button>
        </div>
      </div>
      <div class="ci-price">Rs.${item.price*item.qty}</div>
      <button class="ci-del" onclick="Cart.remove('${item.id}')">✕</button>
    </div>
  `).join('');
  renderTotals();
}

function renderTotals(){
  const items=Cart.get();
  const sub=items.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=Math.round(sub*discount);
  const fee=delType==='delivery'?deliveryFee:0;
  const total=sub-disc+fee;
  document.getElementById('totals-block').innerHTML=`
    <div class="totals-row"><span>Subtotal</span><span>Rs. ${sub}</span></div>
    ${disc?`<div class="totals-row discount"><span>Discount (${Math.round(discount*100)}%)</span><span>−Rs. ${disc}</span></div>`:''}
    <div class="totals-row"><span>Delivery</span><span>${fee?`Rs. ${fee}`:'Free'}</span></div>
    <div class="totals-row grand"><span>Total</span><span>Rs. ${total}</span></div>
  `;
}

// Re-render whenever cart changes
Cart.onChange(renderCart);

// ── DELIVERY TOGGLE ───────────────────────────────────────────
window.setDel=function(type){
  delType=type;
  document.getElementById('opt-del').classList.toggle('active',type==='delivery');
  document.getElementById('opt-pick').classList.toggle('active',type==='pickup');
  document.getElementById('del-fields').style.display=type==='delivery'?'':'none';
  renderTotals();
};

// ── GPS ───────────────────────────────────────────────────────
window.getGPS=function(){
  const s=document.getElementById('gps-status');
  s.textContent='Getting location...';
  navigator.geolocation.getCurrentPosition(
    p=>{ userGPS={lat:p.coords.latitude,lng:p.coords.longitude}; s.textContent=`📍 Location captured`; s.style.color='var(--yellow)'; },
    ()=>{ s.textContent='Location denied. Enter address manually.'; }
  );
};

// ── PROMO ─────────────────────────────────────────────────────
window.applyPromo=async function(){
  const code=document.getElementById('promo-inp').value.trim();
  if(!code){ Toast.show('Enter a promo code'); return; }
  const res=await PromoEngine.validate(code);
  if(res.valid){ discount=res.discount; Toast.show(res.msg+' 🎉'); renderTotals(); }
  else Toast.show(res.msg);
};

// ── PLACE ORDER ───────────────────────────────────────────────
window.placeOrder=async function(){
  const items=Cart.get();
  if(!items.length){ Toast.show('Your cart is empty!'); return; }
  const name=document.getElementById('inp-name').value.trim();
  const phone=document.getElementById('inp-phone').value.trim();
  if(!name||!phone){ Toast.show('Please enter your name and phone'); return; }
  if(delType==='delivery'&&!document.getElementById('inp-addr').value.trim()){ Toast.show('Please enter delivery address'); return; }

  const sub=items.reduce((s,c)=>s+c.price*c.qty,0);
  const disc=Math.round(sub*discount);
  const fee=delType==='delivery'?deliveryFee:0;
  const order={
    id:Date.now().toString(36).toUpperCase(),
    customer:{name,phone,uid:currentUser?.uid||null,email:currentUser?.email||null},
    address:delType==='delivery'?document.getElementById('inp-addr').value:'PICKUP',
    gps:userGPS,
    items:items.map(i=>({id:i.id,name:i.name,price:i.price,qty:i.qty})),
    notes:document.getElementById('inp-notes').value,
    subtotal:sub,discount:disc,deliveryFee:fee,total:sub-disc+fee,
    deliveryType:delType,status:'pending',timestamp:Date.now()
  };
  try{
    const db=getDB();
    if(db) await db.ref('orders/'+order.id).set(order);
    Cart.clear();
    location.href='tracking.html?order='+order.id;
  } catch(e){
    Toast.show('Order saved! Redirecting...');
    Cart.clear();
    setTimeout(()=>location.href='tracking.html?order='+order.id,1200);
  }
};

// ── WHATSAPP ──────────────────────────────────────────────────
window.orderWA=function(){
  const items=Cart.get();
  if(!items.length){ Toast.show('Cart is empty!'); return; }
  const name=document.getElementById('inp-name').value||'Customer';
  const phone=document.getElementById('inp-phone').value;
  const addr=document.getElementById('inp-addr').value;
  const sub=items.reduce((s,c)=>s+c.price*c.qty,0);
  const fee=delType==='delivery'?deliveryFee:0;
  const disc=Math.round(sub*discount);
  let msg=`🥔 *TEMPURA POTATO ORDER*\n\n👤 *Name:* ${name}\n📞 *Phone:* ${phone}\n🚚 *Type:* ${delType==='delivery'?'Delivery':'Pickup'}\n`;
  if(delType==='delivery') msg+=`📍 *Address:* ${addr}\n`;
  if(userGPS) msg+=`🗺️ *Location:* https://maps.google.com/?q=${userGPS.lat},${userGPS.lng}\n`;
  msg+=`\n🛒 *Items:*\n`;
  items.forEach(i=>msg+=`  • ${i.name} ×${i.qty} — Rs. ${i.price*i.qty}\n`);
  if(disc) msg+=`\n💸 *Discount:* −Rs. ${disc}`;
  msg+=`\n💰 *Total: Rs. ${sub-disc+fee}*`;
  const notes=document.getElementById('inp-notes').value;
  if(notes) msg+=`\n📝 *Notes:* ${notes}`;
  window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`, '_blank');
};

// ── BOOT ─────────────────────────────────────────────────────
renderCart();
renderAuth();
</script>
</body>
</html>
